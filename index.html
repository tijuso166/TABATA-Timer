<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Tabata Timer</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Tabata">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="theme-color" content="#000000">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        /* ===== TIMER SCREEN ===== */
        .screen {
            width: 100%;
            max-width: 430px;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 52px 28px 44px;
            padding-top: calc(52px + env(safe-area-inset-top));
            padding-bottom: calc(44px + env(safe-area-inset-bottom));
        }

        /* Phase header */
        .phase-header {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .phase-name {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 0.4px;
            color: #fff;
        }

        .settings-btn, .info-btn {
            position: absolute;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1.5px solid #3a3a3a;
            background: transparent;
            color: #888;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
        }
        .settings-btn { right: 0; }
        .info-btn { left: 0; }
        .settings-btn:active, .info-btn:active { opacity: 0.5; }
        .settings-btn svg, .info-btn svg { width: 19px; height: 19px; }

        /* Stats row */
        .stats-row {
            display: flex;
            width: 100%;
            justify-content: space-around;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .stat-value {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
        }

        .stat-label {
            font-size: 12px;
            font-weight: 500;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        /* Ring container */
        .ring-container {
            position: relative;
            width: 260px;
            height: 260px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            touch-action: manipulation;
        }

        .ring-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .timer-center {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .countdown-number {
            font-size: 72px;
            font-weight: 800;
            line-height: 1;
            color: #fff;
            font-variant-numeric: tabular-nums;
        }

        .total-time-display {
            font-size: 13px;
            font-weight: 500;
            color: #555;
            font-variant-numeric: tabular-nums;
            text-align: center;
        }

        /* Controls */
        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 28px;
        }

        .btn {
            border-radius: 50%;
            border: 2px solid #fff;
            background: transparent;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.1s;
            touch-action: manipulation;
            padding: 0;
        }
        .btn:active { opacity: 0.5; }

        .btn-stop, .btn-skip {
            width: 56px;
            height: 56px;
        }
        .btn-stop svg, .btn-skip svg {
            width: 22px;
            height: 22px;
        }

        .btn-pause {
            width: 92px;
            height: 92px;
        }
        .btn-pause svg {
            width: 34px;
            height: 34px;
        }

        /* ===== SETTINGS OVERLAY ===== */
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 50;
            flex-direction: column;
            padding: 52px 28px 44px;
            padding-top: calc(52px + env(safe-area-inset-top));
            padding-bottom: calc(44px + env(safe-area-inset-bottom));
        }
        .overlay.active { display: flex; }

        .overlay-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
        }

        .overlay-title {
            font-size: 22px;
            font-weight: 700;
        }

        .close-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1.5px solid #3a3a3a;
            background: transparent;
            color: #888;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
        }
        .close-btn:active { opacity: 0.5; }

        .settings-list { flex: 1; overflow-y: auto; }

        .stepper-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 0;
            border-bottom: 1px solid #1c1c1c;
        }
        .stepper-row:first-child { border-top: 1px solid #1c1c1c; }

        .stepper-label {
            font-size: 16px;
            color: #ccc;
        }

        .stepper-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stepper-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1.5px solid #3a3a3a;
            background: transparent;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            touch-action: manipulation;
        }
        .stepper-btn:active { opacity: 0.5; }

        .stepper-value {
            font-size: 17px;
            font-weight: 600;
            min-width: 54px;
            text-align: center;
            font-variant-numeric: tabular-nums;
        }

        /* ===== FAVORITES ===== */
        .favorites-section { margin-top: 24px; }

        .favorites-label {
            font-size: 13px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin-bottom: 10px;
        }

        .favorites-row {
            display: flex;
            gap: 10px;
        }

        .favorite-slot {
            flex: 1;
            min-width: 0;
            min-height: 72px;
            border: 1.5px dashed #333;
            border-radius: 12px;
            background: transparent;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            padding: 10px 4px;
            cursor: pointer;
            touch-action: manipulation;
        }
        .favorite-slot:not(.empty) { border-style: solid; border-color: #3a3a3a; }
        .favorite-slot:active { opacity: 0.6; }

        .favorite-plus { font-size: 20px; color: #555; line-height: 1; }
        .favorite-empty-label { font-size: 10px; color: #555; text-align: center; line-height: 1.3; }
        .favorite-main { font-size: 14px; font-weight: 700; color: #fff; text-align: center; }
        .favorite-sub { font-size: 9.5px; color: #777; text-align: center; line-height: 1.3; }

        .save-btn {
            margin-top: 28px;
            width: 100%;
            padding: 18px;
            border-radius: 14px;
            border: 2px solid #fff;
            background: transparent;
            color: #fff;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            flex-shrink: 0;
            touch-action: manipulation;
        }
        .save-btn:active { opacity: 0.5; }

        /* ===== FINISH SCREEN ===== */
        .finish-screen {
            display: none;
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 40px 28px;
            text-align: center;
        }
        .finish-screen.active { display: flex; }

        .finish-check {
            font-size: 88px;
            line-height: 1;
            color: #22c55e;
        }

        .finish-title {
            font-size: 28px;
            font-weight: 800;
        }

        .finish-stats {
            font-size: 16px;
            color: #555;
            line-height: 2;
        }

        .finish-actions {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }

        .restart-btn, .end-btn {
            padding: 18px 40px;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            touch-action: manipulation;
        }
        .restart-btn {
            border: 2px solid #fff;
            background: transparent;
            color: #fff;
        }
        .end-btn {
            border: 2px solid #444;
            background: transparent;
            color: #aaa;
        }
        .restart-btn:active, .end-btn:active { opacity: 0.5; }

        .ics-link {
            margin-top: 18px;
            background: none;
            border: none;
            color: #666;
            font-size: 14px;
            text-decoration: underline;
            cursor: pointer;
            touch-action: manipulation;
            padding: 8px;
        }
        .ics-link:active { opacity: 0.5; }

        /* ===== CONFIRM DIALOG ===== */
        .confirm-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 200;
            align-items: center;
            justify-content: center;
            padding: 28px;
        }
        .confirm-overlay.active { display: flex; }

        .confirm-box {
            width: 100%;
            max-width: 320px;
            background: #111;
            border: 1px solid #2a2a2a;
            border-radius: 16px;
            padding: 24px 20px;
            text-align: center;
        }

        .confirm-text {
            font-size: 16px;
            color: #fff;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .confirm-actions { display: flex; gap: 12px; }

        .confirm-btn {
            flex: 1;
            padding: 14px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            touch-action: manipulation;
        }
        .confirm-btn-secondary { border: 2px solid #fff; background: transparent; color: #fff; }
        .confirm-btn-danger { border: 2px solid #ef4444; background: transparent; color: #ef4444; }
        .confirm-btn:active { opacity: 0.5; }

        /* ===== README OVERLAY ===== */
        .readme-content {
            flex: 1;
            overflow-y: auto;
            color: #ccc;
            font-size: 15px;
            line-height: 1.6;
        }
        .readme-content p { margin-bottom: 16px; }
        .readme-content a { color: #fff; }
        .readme-version { color: #555; font-size: 13px; }
    </style>
</head>
<body>

<!-- ===== TIMER SCREEN ===== -->
<div class="screen" id="timerScreen">
    <div class="phase-header">
        <button class="info-btn" id="infoBtn" aria-label="Info">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="9"></circle>
                <line x1="12" y1="11" x2="12" y2="16"></line>
                <circle cx="12" cy="7.5" r="0.5" fill="currentColor" stroke="none"></circle>
            </svg>
        </button>
        <div class="phase-name" id="phaseName">Warm-up</div>
        <button class="settings-btn" id="settingsBtn" aria-label="Einstellungen">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
            </svg>
        </button>
    </div>

    <div class="stats-row">
        <div class="stat-item">
            <div class="stat-value" id="setsValue">—</div>
            <div class="stat-label">Sets</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="cyclesValue">—</div>
            <div class="stat-label">Cycles</div>
        </div>
    </div>

    <div class="ring-container">
        <svg class="ring-svg" viewBox="0 0 260 260" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" id="ringGradA" stop-color="#22c55e"/>
                    <stop offset="100%" id="ringGradB" stop-color="#06b6d4"/>
                </linearGradient>
            </defs>
            <!-- Track -->
            <circle cx="130" cy="130" r="105" fill="none" stroke="#1a1a1a" stroke-width="17"/>
            <!-- Single ring: current phase, fills over time -->
            <circle id="ring" cx="130" cy="130" r="105" fill="none"
                    stroke="url(#ringGrad)" stroke-width="17" stroke-linecap="round"
                    transform="rotate(-90 130 130)"
                    stroke-dasharray="659.73" stroke-dashoffset="659.73"/>
        </svg>
        <div class="timer-center">
            <div class="countdown-number" id="countdownNum">60</div>
        </div>
    </div>

    <div class="controls">
        <button class="btn btn-stop" id="stopBtn" aria-label="Stop">
            <svg viewBox="0 0 24 24" fill="currentColor"><rect x="5" y="5" width="14" height="14" rx="2"></rect></svg>
        </button>
        <button class="btn btn-pause" id="pauseBtn" aria-label="Start"></button>
        <button class="btn btn-skip" id="skipBtn" aria-label="Überspringen">
            <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="4,4 13,12 4,20"></polygon><polygon points="12,4 21,12 12,20"></polygon></svg>
        </button>
    </div>

    <div class="total-time-display" id="totalTimeDisplay">-00:00</div>
</div>

<!-- ===== SETTINGS OVERLAY ===== -->
<div class="overlay" id="settingsOverlay">
    <div class="overlay-header">
        <div class="overlay-title">Einstellungen</div>
        <button class="close-btn" id="closeBtn" aria-label="Schließen">✕</button>
    </div>
    <div class="settings-list" id="settingsList"></div>
    <button class="save-btn" id="saveBtn">Speichern</button>
</div>

<!-- ===== FINISH SCREEN ===== -->
<div class="finish-screen" id="finishScreen">
    <div class="finish-check">✓</div>
    <div class="finish-title">Workout abgeschlossen!</div>
    <div class="finish-stats" id="finishStats"></div>
    <div class="finish-actions">
        <button class="restart-btn" id="restartBtn">Nochmal</button>
        <button class="end-btn" id="endBtn">Ende</button>
    </div>
    <button class="ics-link" id="icsBtn">Zum Kalender hinzufügen</button>
</div>

<!-- ===== STOP CONFIRMATION ===== -->
<div class="confirm-overlay" id="stopConfirmOverlay">
    <div class="confirm-box">
        <div class="confirm-text">Workout wirklich beenden?</div>
        <div class="confirm-actions">
            <button class="confirm-btn confirm-btn-secondary" id="stopCancelBtn">Nein</button>
            <button class="confirm-btn confirm-btn-danger" id="stopConfirmBtn">Ja</button>
        </div>
    </div>
</div>

<!-- ===== README OVERLAY ===== -->
<div class="overlay" id="readmeOverlay">
    <div class="overlay-header">
        <div class="overlay-title">Über die App</div>
        <button class="close-btn" id="readmeCloseBtn" aria-label="Schließen">✕</button>
    </div>
    <div class="readme-content">
        <p>Feedback &amp; Bugs an: <a href="mailto:til.sonntag@gmail.com">til.sonntag@gmail.com</a></p>
        <p class="readme-version" id="readmeVersion"></p>
    </div>
</div>

<script>
// ==================== VERSION ====================
// Semantic versioning (MAJOR.MINOR.PATCH):
//   PATCH (+0.0.1): bugfixes only (e.g. rendering glitches, sound repairs)
//   MINOR (+0.1.0): new features (e.g. favorites, calendar export, countdown)
//   MAJOR (+1.0.0): breaking changes to the core concept
// Bump both constants below (date in ISO format) with every shipped change.
const APP_VERSION = '1.1.0';
const APP_VERSION_DATE = '2026-07-03';

// ==================== CONSTANTS ====================
const RING_R    = 105;
const RING_CIRC = 2 * Math.PI * RING_R;   // ~659.73
const EXPECTED_RING_COUNT = 2; // 1 background track + 1 progress ring, never more

const COLORS = {
    warmup:   ['#22c55e', '#06b6d4'],
    exercise: ['#ff6b35', '#e8001e'],
    pause:    ['#22c55e', '#06b6d4'],
    cooldown: ['#3b82f6', '#06b6d4'],
    done:     ['#2a2a2a', '#2a2a2a'],
};

const PHASE_LABEL = {
    warmup:   'Warm-up',
    exercise: 'Übung',
    pause:    'Pause',
    cooldown: 'Cooldown',
};

const ICON_PLAY  = '<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="6,4 20,12 6,20"></polygon></svg>';
const ICON_PAUSE = '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="5" y="4" width="5" height="16" rx="1.5"></rect><rect x="14" y="4" width="5" height="16" rx="1.5"></rect></svg>';

// ==================== SETTINGS ====================
const DEFAULTS = {
    exerciseTime: 40,
    pauseTime:    20,
    warmupTime:   60,
    cooldownTime: 30,
    setsPerCycle: 6,
    cycles:       3,
};

const SETTINGS_CONFIG = [
    { key: 'exerciseTime',  label: 'Exercise-Zeit',       unit: 's', step: 5, min: 5 },
    { key: 'pauseTime',     label: 'Pausen-Zeit',         unit: 's', step: 5, min: 5 },
    { key: 'warmupTime',    label: 'Warm-up',             unit: 's', step: 5, min: 0 },
    { key: 'cooldownTime',  label: 'Cooldown',            unit: 's', step: 5, min: 0 },
    { key: 'setsPerCycle',  label: 'Übungen pro Zyklus',  unit: '',  step: 1, min: 1 },
    { key: 'cycles',        label: 'Zyklen',              unit: '',  step: 1, min: 1 },
];

let settings = { ...DEFAULTS };
let tempSettings = { ...DEFAULTS };

// ==================== FAVORITES ====================
const FAVORITES_KEY = 'tabataFavorites';
const FAVORITE_FIELDS = ['exerciseTime', 'pauseTime', 'warmupTime', 'cooldownTime', 'setsPerCycle', 'cycles'];

function loadFavorites() {
    try {
        const raw = localStorage.getItem(FAVORITES_KEY);
        const arr = raw ? JSON.parse(raw) : null;
        if (Array.isArray(arr) && arr.length === 3) return arr;
    } catch (e) {
        console.error('[favorites] failed to load, resetting:', e);
    }
    return [null, null, null];
}

function persistFavorites() {
    try {
        localStorage.setItem(FAVORITES_KEY, JSON.stringify(favorites));
    } catch (e) {
        console.error('[favorites] failed to save:', e);
    }
}

let favorites = loadFavorites();

// ==================== STATE ====================
let phaseSeq   = [];   // [{type, duration, set, cycle}]
let phaseIdx   = 0;
let timeLeft   = 0;
let running    = false;
let started    = false; // has the first real phase begun (i.e. the 3-2-1 countdown finished)?
let intervalId = null;
let preCountdownValue = 0; // >0 while showing the 3-2-1 pre-workout countdown
let lastWorkoutDurationSec = 0; // captured at finish time, used for the .ics export

// ==================== AUDIO ====================
let audioCtx = null;

function audio() {
    if (!audioCtx) {
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            console.log('[audio] AudioContext created, state:', audioCtx.state);
        } catch (e) {
            console.error('[audio] failed to create AudioContext:', e);
        }
    }
    return audioCtx;
}

// Sounds are scheduled from setInterval callbacks, not user gestures, so the
// context can end up 'suspended' (first load, or after the tab/app was
// backgrounded) — resume it defensively before every scheduled sound.
function ensureAudioResumed() {
    const ctx = audio();
    if (ctx && ctx.state === 'suspended') {
        ctx.resume()
            .then(() => console.log('[audio] resumed ok, state:', ctx.state))
            .catch(e => console.error('[audio] resume FAILED:', e));
    }
    return ctx;
}

function tone(freq, when, dur, vol, label) {
    try {
        const ctx = audio();
        if (!ctx) throw new Error('no AudioContext available');
        const osc = ctx.createOscillator();
        const g   = ctx.createGain();
        osc.connect(g);
        g.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.value = freq;
        g.gain.setValueAtTime(0, when);
        g.gain.linearRampToValueAtTime(vol, when + 0.01);
        g.gain.linearRampToValueAtTime(0, when + dur);
        osc.start(when);
        osc.stop(when + dur + 0.02);
        console.log(`[audio] ${label} ok (freq=${freq}Hz, ctxState=${ctx.state})`);
        return true;
    } catch (e) {
        console.error(`[audio] ${label} FAILED to start:`, e);
        return false;
    }
}

function sweep(f0, f1, when, dur, vol, label) {
    try {
        const ctx = audio();
        if (!ctx) throw new Error('no AudioContext available');
        const osc = ctx.createOscillator();
        const g   = ctx.createGain();
        osc.connect(g);
        g.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(f0, when);
        osc.frequency.linearRampToValueAtTime(f1, when + dur);
        g.gain.setValueAtTime(0, when);
        g.gain.linearRampToValueAtTime(vol, when + 0.01);
        g.gain.linearRampToValueAtTime(0, when + dur);
        osc.start(when);
        osc.stop(when + dur + 0.02);
        console.log(`[audio] ${label} ok (sweep ${f0}->${f1}Hz, ctxState=${ctx.state})`);
        return true;
    } catch (e) {
        console.error(`[audio] ${label} FAILED to start:`, e);
        return false;
    }
}

function beep() {
    ensureAudioResumed();
    tone(880, audio().currentTime, 0.08, 0.28, 'countdown-beep');
    vibrate(50);
}

function phaseSound(type) {
    ensureAudioResumed();
    const t = audio().currentTime;
    switch (type) {
        case 'warmup':
            sweep(440, 660, t, 0.4, 0.25, 'warmup-start');
            break;
        case 'exercise':
            tone(1047, t, 0.15, 0.35, 'exercise-start-1');
            tone(1319, t + 0.17, 0.15, 0.35, 'exercise-start-2');
            break;
        case 'pause':
            sweep(659, 523, t, 0.3, 0.3, 'pause-start');
            break;
        case 'cooldown':
            sweep(660, 440, t, 0.4, 0.25, 'cooldown-start');
            break;
        case 'done':
            [523, 659, 784, 1047].forEach((f, i) => tone(f, t + i * 0.16, 0.15, 0.35, `done-arpeggio-${i}`));
            break;
    }
}

// ==================== VIBRATION ====================
const PHASE_VIBRATION = {
    exercise: [100],
    pause:    [200, 100, 200],
    warmup:   [200, 100, 200],
    cooldown: [200, 100, 200],
};

function vibrate(pattern) {
    if (!('vibrate' in navigator)) return; // e.g. iOS Safari: known platform limit, ignore silently
    try {
        const accepted = navigator.vibrate(pattern);
        console.log(`[vibrate] pattern=${JSON.stringify(pattern)} accepted=${accepted}`);
    } catch (e) {
        console.error('[vibrate] failed:', e);
    }
}

function phaseVibrate(type) {
    const pattern = PHASE_VIBRATION[type];
    if (pattern) vibrate(pattern);
}

// ==================== SEQUENCE ====================
function buildSeq(s) {
    const seq = [];
    seq.push({ type: 'warmup', duration: s.warmupTime, set: null, cycle: null });
    for (let c = 1; c <= s.cycles; c++) {
        for (let set = 1; set <= s.setsPerCycle; set++) {
            seq.push({ type: 'exercise', duration: s.exerciseTime, set, cycle: c });
            seq.push({ type: 'pause',    duration: s.pauseTime,    set, cycle: c });
        }
    }
    seq.push({ type: 'cooldown', duration: s.cooldownTime, set: null, cycle: null });
    // Phases with 0 duration (only possible for warm-up/cooldown) are skipped entirely.
    return seq.filter(p => p.duration > 0);
}

function remainingTime() {
    if (phaseIdx >= phaseSeq.length) return 0;
    return timeLeft + phaseSeq.slice(phaseIdx + 1).reduce((s, p) => s + p.duration, 0);
}

// ==================== RING INTEGRITY CHECK ====================
// Only a single ring is allowed to exist now: 1 background track + 1
// progress circle, nothing more. Called at every phase change and logs the
// result unconditionally, so a regression is immediately visible in the
// console; if a duplicate ever shows up, it's removed on the spot.
function verifyRingIntegrity(context) {
    const svg = document.querySelector('.ring-svg');
    if (!svg) return;
    const circles = svg.querySelectorAll('circle');
    if (circles.length === EXPECTED_RING_COUNT) {
        console.log(`[ring-check] ${context}: OK — ${circles.length} <circle> element(s) (1 track + 1 progress ring).`);
        return;
    }
    console.error(`[ring-check] ${context}: MISMATCH — found ${circles.length} <circle> element(s), expected ${EXPECTED_RING_COUNT}. Removing extras.`);
    const seenIds = new Set();
    let untaggedCount = 0;
    circles.forEach(c => {
        if (c.id) {
            if (seenIds.has(c.id)) { c.remove(); return; }
            seenIds.add(c.id);
        } else {
            untaggedCount++;
            if (untaggedCount > 1) c.remove();
        }
    });
}

// ==================== WAKE LOCK ====================
let wakeLock = null;

async function requestWakeLock() {
    if (!('wakeLock' in navigator)) return;
    try {
        wakeLock = await navigator.wakeLock.request('screen');
    } catch (e) {
        wakeLock = null;
    }
}

function releaseWakeLock() {
    if (wakeLock) {
        wakeLock.release().catch(() => {});
        wakeLock = null;
    }
}

document.addEventListener('visibilitychange', () => {
    console.log(`[visibility] -> ${document.visibilityState} | running=${running} | audioCtxState=${audioCtx ? audioCtx.state : 'none'} | intervalActive=${intervalId !== null}`);
    if (document.visibilityState === 'visible' && running) {
        requestWakeLock();
        ensureAudioResumed();
    }
});

// ==================== TIMER ====================
function initTimer() {
    clearInterval(intervalId);
    intervalId = null;
    phaseSeq  = buildSeq(settings);
    phaseIdx  = 0;
    timeLeft  = phaseSeq[0].duration;
    running   = false;
    started   = false;
    preCountdownValue = 0;
    releaseWakeLock();
    updateUI();
}

function startTimer() {
    if (running) return;
    ensureAudioResumed();
    if (!started) {
        runPreCountdown();
        return;
    }
    // Resuming after a manual mid-workout pause: no countdown, continue directly.
    running = true;
    intervalId = setInterval(tick, 1000);
    requestWakeLock();
    updateUI();
}

function runPreCountdown() {
    running = true;
    preCountdownValue = 3;
    requestWakeLock();
    verifyRingIntegrity('pre-workout countdown start');
    beep();
    updateUI();
    intervalId = setInterval(() => {
        preCountdownValue--;
        if (preCountdownValue <= 0) {
            clearInterval(intervalId);
            preCountdownValue = 0;
            beginFirstPhase();
        } else {
            beep();
            updateUI();
        }
    }, 1000);
}

function beginFirstPhase() {
    started = true;
    timeLeft = phaseSeq[phaseIdx].duration;
    phaseSound(phaseSeq[phaseIdx].type);
    phaseVibrate(phaseSeq[phaseIdx].type);
    intervalId = setInterval(tick, 1000);
    updateUI();
    verifyRingIntegrity(`phase start: ${phaseSeq[phaseIdx].type}`);
}

function pauseTimer() {
    if (!running) return;
    running = false;
    clearInterval(intervalId);
    intervalId = null;
    // Cancelling mid pre-countdown means starting over from "3" next time,
    // since the workout hasn't actually begun yet.
    if (preCountdownValue > 0) preCountdownValue = 0;
    releaseWakeLock();
    updateUI();
}

function stopTimer() {
    initTimer();
}

function skipPhase() {
    if (preCountdownValue > 0) return; // nothing to skip before the workout has begun
    ensureAudioResumed();
    advance();
}

function tick() {
    timeLeft--;
    if (timeLeft <= 3 && timeLeft > 0) beep();
    if (timeLeft <= 0) {
        advance();
    } else {
        updateUI();
    }
}

function advance() {
    phaseIdx++;
    if (phaseIdx >= phaseSeq.length) {
        running = false;
        clearInterval(intervalId);
        intervalId = null;
        releaseWakeLock();
        phaseSound('done');
        showFinish();
        return;
    }
    timeLeft = phaseSeq[phaseIdx].duration;
    phaseSound(phaseSeq[phaseIdx].type);
    phaseVibrate(phaseSeq[phaseIdx].type);
    updateUI();
    verifyRingIntegrity(`phase change: ${phaseSeq[phaseIdx].type}`);
}

// ==================== UI ====================
function fmt(s) {
    const m = String(Math.floor(s / 60)).padStart(2, '0');
    const sec = String(s % 60).padStart(2, '0');
    return `${m}:${sec}`;
}

function updatePauseIcon() {
    const pauseBtn = document.getElementById('pauseBtn');
    pauseBtn.innerHTML = running ? ICON_PAUSE : ICON_PLAY;
    pauseBtn.setAttribute('aria-label', running ? 'Pause' : 'Start');
}

function updateUI() {
    if (preCountdownValue > 0) {
        // Ring/stats were already rendered correctly by the last real render
        // (idle state points at phaseSeq[0]); only the big number changes.
        document.getElementById('countdownNum').textContent = preCountdownValue;
        updatePauseIcon();
        return;
    }

    if (phaseIdx >= phaseSeq.length) return;
    const phase = phaseSeq[phaseIdx];

    // Header
    document.getElementById('phaseName').textContent = PHASE_LABEL[phase.type];

    // Stats
    const inWorkout = phase.type === 'exercise' || phase.type === 'pause';
    document.getElementById('setsValue').textContent =
        inWorkout ? `${phase.set}/${settings.setsPerCycle}` : '—';
    document.getElementById('cyclesValue').textContent =
        inWorkout
            ? `${phase.cycle}/${settings.cycles}`
            : (phase.type === 'warmup' ? `1/${settings.cycles}` : `${settings.cycles}/${settings.cycles}`);

    // Numbers
    document.getElementById('countdownNum').textContent = timeLeft;
    document.getElementById('totalTimeDisplay').textContent = '-' + fmt(remainingTime());

    // Ring (current phase progress, fills clockwise)
    const progress = (phase.duration - timeLeft) / phase.duration;
    const ringOffset = RING_CIRC * (1 - progress);
    document.getElementById('ring').setAttribute('stroke-dashoffset', ringOffset.toFixed(2));

    // Color (current phase only — there is no second ring to preview "next")
    const [cA, cB] = COLORS[phase.type];
    document.getElementById('ringGradA').setAttribute('stop-color', cA);
    document.getElementById('ringGradB').setAttribute('stop-color', cB);

    updatePauseIcon();
}

// ==================== SETTINGS UI: STEPPERS ====================
let stepperValueEls = {};

function buildStepperRow(cfg) {
    const row = document.createElement('div');
    row.className = 'stepper-row';

    const lbl = document.createElement('div');
    lbl.className = 'stepper-label';
    lbl.textContent = cfg.label;

    const ctrl = document.createElement('div');
    ctrl.className = 'stepper-controls';

    const minus = document.createElement('button');
    minus.className = 'stepper-btn';
    minus.textContent = '−';
    minus.setAttribute('aria-label', 'Verringern');

    const val = document.createElement('div');
    val.className = 'stepper-value';
    val.textContent = tempSettings[cfg.key] + cfg.unit;
    stepperValueEls[cfg.key] = val;

    const plus = document.createElement('button');
    plus.className = 'stepper-btn';
    plus.textContent = '+';
    plus.setAttribute('aria-label', 'Erhöhen');

    minus.addEventListener('click', () => {
        if (tempSettings[cfg.key] - cfg.step >= cfg.min) {
            tempSettings[cfg.key] -= cfg.step;
            val.textContent = tempSettings[cfg.key] + cfg.unit;
        }
    });
    plus.addEventListener('click', () => {
        tempSettings[cfg.key] += cfg.step;
        val.textContent = tempSettings[cfg.key] + cfg.unit;
    });

    ctrl.append(minus, val, plus);
    row.append(lbl, ctrl);
    return row;
}

function refreshStepperDisplays() {
    SETTINGS_CONFIG.forEach(cfg => {
        if (stepperValueEls[cfg.key]) {
            stepperValueEls[cfg.key].textContent = tempSettings[cfg.key] + cfg.unit;
        }
    });
}

// ==================== SETTINGS UI: FAVORITES ====================
function renderFavoriteSlot(slot, fav) {
    slot.innerHTML = '';
    if (!fav) {
        slot.classList.add('empty');
        const plus = document.createElement('div');
        plus.className = 'favorite-plus';
        plus.textContent = '+';
        const label = document.createElement('div');
        label.className = 'favorite-empty-label';
        label.textContent = 'Favorit speichern';
        slot.append(plus, label);
    } else {
        slot.classList.remove('empty');
        const main = document.createElement('div');
        main.className = 'favorite-main';
        main.textContent = `${fav.exerciseTime}s/${fav.pauseTime}s`;
        const sub = document.createElement('div');
        sub.className = 'favorite-sub';
        sub.textContent = `Sets: ${fav.setsPerCycle} / Zyklen: ${fav.cycles}`;
        slot.append(main, sub);
    }
}

function buildFavoriteSlot(idx) {
    const slot = document.createElement('button');
    slot.className = 'favorite-slot';
    slot.type = 'button';
    renderFavoriteSlot(slot, favorites[idx]);

    let pressTimer = null;
    let longPressFired = false;

    const startPress = () => {
        longPressFired = false;
        pressTimer = setTimeout(() => {
            if (favorites[idx]) {
                longPressFired = true;
                if (confirm('Favorit überschreiben?')) {
                    favorites[idx] = null;
                    persistFavorites();
                    renderFavoriteSlot(slot, null);
                }
            }
        }, 600);
    };
    const cancelPress = () => clearTimeout(pressTimer);

    slot.addEventListener('touchstart', startPress, { passive: true });
    slot.addEventListener('touchend', cancelPress);
    slot.addEventListener('touchmove', cancelPress);
    slot.addEventListener('mousedown', startPress);
    slot.addEventListener('mouseup', cancelPress);
    slot.addEventListener('mouseleave', cancelPress);

    slot.addEventListener('click', () => {
        if (longPressFired) { longPressFired = false; return; }
        if (!favorites[idx]) {
            favorites[idx] = FAVORITE_FIELDS.reduce((acc, k) => { acc[k] = tempSettings[k]; return acc; }, {});
            persistFavorites();
            renderFavoriteSlot(slot, favorites[idx]);
        } else {
            FAVORITE_FIELDS.forEach(k => { tempSettings[k] = favorites[idx][k]; });
            refreshStepperDisplays();
        }
    });

    return slot;
}

function buildFavoritesSection() {
    const wrap = document.createElement('div');
    wrap.className = 'favorites-section';

    const label = document.createElement('div');
    label.className = 'favorites-label';
    label.textContent = 'Favoriten';

    const row = document.createElement('div');
    row.className = 'favorites-row';
    for (let i = 0; i < 3; i++) row.appendChild(buildFavoriteSlot(i));

    wrap.append(label, row);
    return wrap;
}

// ==================== SETTINGS UI ====================
function buildSettingsUI() {
    tempSettings = { ...settings };
    stepperValueEls = {};
    const list = document.getElementById('settingsList');
    list.innerHTML = '';
    SETTINGS_CONFIG.forEach(cfg => {
        list.appendChild(buildStepperRow(cfg));
    });
    list.appendChild(buildFavoritesSection());
}

function openSettings() {
    pauseTimer();
    buildSettingsUI();
    document.getElementById('settingsOverlay').classList.add('active');
}

function closeSettings() {
    document.getElementById('settingsOverlay').classList.remove('active');
}

function saveSettings() {
    settings = { ...tempSettings };
    closeSettings();
    // Only apply the values and return to the (idle, 0%-ring) start screen —
    // the user has to press Play themselves.
    initTimer();
}

// ==================== FINISH SCREEN ====================
function pad2(n) { return String(n).padStart(2, '0'); }

function icsTimestamp(date) {
    return date.getUTCFullYear() +
        pad2(date.getUTCMonth() + 1) +
        pad2(date.getUTCDate()) + 'T' +
        pad2(date.getUTCHours()) +
        pad2(date.getUTCMinutes()) +
        pad2(date.getUTCSeconds()) + 'Z';
}

function downloadWorkoutICS() {
    const end = new Date();
    const start = new Date(end.getTime() - lastWorkoutDurationSec * 1000);
    const ics = [
        'BEGIN:VCALENDAR',
        'VERSION:2.0',
        'PRODID:-//Tabata Timer//DE',
        'BEGIN:VEVENT',
        `UID:${Date.now()}@tabata-timer`,
        `DTSTAMP:${icsTimestamp(new Date())}`,
        `DTSTART:${icsTimestamp(start)}`,
        `DTEND:${icsTimestamp(end)}`,
        'SUMMARY:HIIT Workout',
        'END:VEVENT',
        'END:VCALENDAR',
        '',
    ].join('\r\n');

    const blob = new Blob([ics], { type: 'text/calendar' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'hiit-workout.ics';
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function showFinish() {
    verifyRingIntegrity('showFinish');
    const totalSets = settings.setsPerCycle * settings.cycles;
    lastWorkoutDurationSec = buildSeq(settings).reduce((s, p) => s + p.duration, 0);
    document.getElementById('finishStats').innerHTML =
        `Gesamtzeit: ${fmt(lastWorkoutDurationSec)}<br>${totalSets} Sets &middot; ${settings.cycles} Zyklen`;
    document.getElementById('finishScreen').classList.add('active');
}

function hideFinish() {
    document.getElementById('finishScreen').classList.remove('active');
}

// ==================== STOP CONFIRMATION ====================
function openStopConfirm() {
    document.getElementById('stopConfirmOverlay').classList.add('active');
}

function closeStopConfirm() {
    document.getElementById('stopConfirmOverlay').classList.remove('active');
}

// ==================== README OVERLAY ====================
function formatDeDate(isoDate) {
    const [y, m, d] = isoDate.split('-');
    return `${d}.${m}.${y}`;
}

function openReadme() {
    document.getElementById('readmeVersion').textContent = `Version ${APP_VERSION} · ${formatDeDate(APP_VERSION_DATE)}`;
    document.getElementById('readmeOverlay').classList.add('active');
}

function closeReadme() {
    document.getElementById('readmeOverlay').classList.remove('active');
}

// ==================== EVENT LISTENERS ====================
document.getElementById('settingsBtn').addEventListener('click', openSettings);
document.getElementById('closeBtn').addEventListener('click', closeSettings);
document.getElementById('saveBtn').addEventListener('click', saveSettings);

document.getElementById('infoBtn').addEventListener('click', openReadme);
document.getElementById('readmeCloseBtn').addEventListener('click', closeReadme);

document.getElementById('pauseBtn').addEventListener('click', () => {
    if (running) pauseTimer(); else startTimer();
});
document.getElementById('stopBtn').addEventListener('click', openStopConfirm);
document.getElementById('stopCancelBtn').addEventListener('click', closeStopConfirm);
document.getElementById('stopConfirmBtn').addEventListener('click', () => {
    closeStopConfirm();
    stopTimer();
});
document.getElementById('skipBtn').addEventListener('click', skipPhase);
document.getElementById('restartBtn').addEventListener('click', () => {
    hideFinish();
    initTimer();
    startTimer();
});
document.getElementById('endBtn').addEventListener('click', () => {
    hideFinish();
    initTimer();
});
document.getElementById('icsBtn').addEventListener('click', downloadWorkoutICS);

// touch-action: manipulation (already set throughout the CSS) plus
// user-scalable=no in the viewport meta tag are sufficient to disable
// double-tap-to-zoom natively — no JS touchend interception needed, since
// that previously ate legitimate rapid taps on the stepper +/- buttons.
document.addEventListener('dblclick', e => e.preventDefault());

// ==================== SERVICE WORKER ====================
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
    });
}

// ==================== BOOT ====================
console.log(`[boot] Tabata Timer v${APP_VERSION} (${APP_VERSION_DATE})`);
initTimer();
</script>
